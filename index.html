<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIN SEKAI - FINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --p: #0f172a; --s: #3b82f6; --ok: #10b981; --warn: #f59e0b; --bg: #f1f5f9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #1e293b; }
        header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        
        .search-box { background: rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; padding: 8px 15px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; }
        
        .dept-nav { display: flex; justify-content: space-around; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; margin-bottom: 10px; }
        .dept-btn { background: none; border: none; color: #94a3b8; font-weight: 800; font-size: 0.7rem; cursor: pointer; padding: 10px; }
        .dept-btn.active { color: white; background: var(--s); border-radius: 8px; }

        .cat-bar { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .nav-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex: 1; padding: 5px 0; }
        .tab { padding: 8px 15px; background: #e2e8f0; border-radius: 10px; border: none; white-space: nowrap; font-size: 0.75rem; font-weight: 700; color: #475569; cursor: pointer; }
        .tab.active { background: var(--p); color: white; }
        .add-cat-btn { background: var(--ok); color: white; border: none; border-radius: 10px; padding: 8px 12px; font-weight: bold; cursor: pointer; }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 18px; padding: 18px; margin-bottom: 15px; position: relative; border-left: 8px solid #cbd5e1; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .card.status-in { border-left-color: var(--warn); background: linear-gradient(to right, #fffdf0, #fff); }
        .card.status-ok { border-left-color: var(--ok); background: linear-gradient(to right, #f0fff4, #fff); }
        
        .order-num { position: absolute; top: -10px; left: 15px; background: var(--s); color: white; padding: 3px 10px; font-size: 0.7rem; font-weight: 900; border-radius: 6px; }
        .qty-badge { background: #eff6ff; color: var(--s); padding: 10px 15px; border-radius: 12px; font-weight: 900; font-size: 1.2rem; }
        
        .st-group { display: flex; gap: 5px; margin-top: 15px; }
        .st-btn { flex: 1; padding: 10px 2px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-size: 0.6rem; font-weight: 800; cursor: pointer; }
        .st-btn.active.in { background: var(--warn); color: white; border-color: var(--warn); }
        .st-btn.active.ok { background: var(--ok); color: white; border-color: var(--ok); }
        .st-btn.edit { background: #f8fafc; color: var(--p); }

        /* IMPRESSION */
        @media print {
            header, .fab, .st-group, .print-hide { display: none !important; }
            body { background: white !important; padding: 0; }
            .card { 
                display: flex !important; flex-direction: row !important; align-items: center !important; justify-content: space-between !important;
                border: 0.5px solid #eee !important; border-left: 10px solid #ccc !important;
                margin-bottom: 2px !important; padding: 5px 15px !important; border-radius: 6px !important; height: 50px !important;
            }
            .card.status-ok { border-left-color: #10b981 !important; background: #f0fff4 !important; -webkit-print-color-adjust: exact; }
            .card.status-in { border-left-color: #f59e0b !important; background: #fffdf0 !important; -webkit-print-color-adjust: exact; }
            .qty-badge { background: none !important; border: none !important; font-size: 1rem !important; padding: 0 !important; font-weight: bold; }
            .print-status { display: block !important; font-size: 0.7rem; font-weight: 800; text-align: right; width: 70px; }
        }
        .print-status { display: none; }
        .anno-text { font-size: 0.75rem; color: #3b82f6; font-weight: 600; margin-top: 4px; font-style: italic; }

        .fab { position: fixed; bottom: 25px; right: 20px; width: 60px; height: 60px; border-radius: 20px; background: var(--s); color: white; border: none; font-size: 24px; box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
        .view { display: none; } .view.active { display: block; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <b style="font-size:1.2rem;">SHIN SEKAI <span id="sync-icon">●</span></b>
        <div style="display:flex; gap:8px;">
            <button onclick="window.print()" style="background:rgba(255,255,255,0.2); border:none; color:white; width:35px; height:35px; border-radius:8px;"><i class="fas fa-print"></i></button>
            <button onclick="fetchData()" style="background:none; border:none; color:white; font-size:1.2rem;"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="Recherche..." oninput="render()"></div>
    <div class="dept-nav">
        <button class="dept-btn active" id="b-COUPE" onclick="setDept('COUPE')">COUPE</button>
        <button class="dept-btn" id="b-COUTURE" onclick="setDept('COUTURE')">COUTURE</button>
        <button class="dept-btn" id="b-LOGO" onclick="setDept('LOGO')">LOGO</button>
        <button class="dept-btn" id="b-FINITION" onclick="setDept('FINITION')">FINITION</button>
    </div>
    <div class="cat-bar">
        <div class="nav-scroll" id="navTabs"></div>
        <button class="add-cat-btn" onclick="addCategory()">+</button>
    </div>
</header>

<div class="container">
    <div id="v-main" class="view active"><div id="orderList"></div></div>
    
    <div id="v-form" class="view">
        <div style="background:white; padding:20px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h3 id="formTitle">Fiche Commande</h3>
            <input type="hidden" id="f-id">
            <input type="number" id="f-num" placeholder="Numéro Commande">
            <input type="text" id="f-client" placeholder="Client">
            <input type="text" id="f-color" placeholder="Désignation / Couleur">
            <input type="text" id="f-priority" placeholder="Annotations (Notes)">
            <input type="number" id="f-qty" placeholder="Quantité">
            <select id="f-cat"></select>
            <button onclick="save()" style="width:100%; padding:15px; background:var(--s); color:white; border:none; border-radius:12px; font-weight:bold; font-size:1rem;">ENREGISTRER</button>
            <button onclick="toggleView('v-main')" style="width:100%; margin-top:10px; background:none; border:none; color:#64748b; font-weight:bold;">ANNULER</button>
        </div>
    </div>
</div>

<button class="fab" onclick="prepAdd()">+</button>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyONYLIcVpucYTFYexBibNaZvW0EpIQFoYiSFnEaiKNKGwCHod1hb12mFNzmIy7FVGqfA/exec";
    let orders = [], categories = ["POLOS","PANTALONS"];
    let curTab = "", curDept = 'COUPE', lock = false;

    async function fetchData() {
        if(lock) return;
        document.getElementById('sync-icon').style.color = "orange";
        try {
            const res = await fetch(URL);
            const data = await res.json();
            const cItem = data.find(o => String(o.id) === "999");
            if(cItem) categories = JSON.parse(cItem.client);
            if(!curTab) curTab = categories[0];
            
            orders = data.filter(o => String(o.id) !== "999").map(o => ({
                ...o, 
                dept: (o.dept || "COUPE").toString().toUpperCase().trim()
            }));
            render();
            document.getElementById('sync-icon').style.color = "#10b981";
        } catch(e) { console.error(e); }
    }

    function render() {
        const list = document.getElementById('orderList'); list.innerHTML = '';
        const nav = document.getElementById('navTabs');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        nav.innerHTML = categories.map(c => `<button class="tab ${curTab===c?'active':''}" onclick="curTab='${c}';render();" oncontextmenu="removeCat('${c}');return false;">${c}</button>`).join('');

        const filtered = orders.filter(o => o.dept === curDept && o.cat === curTab && (o.client.toLowerCase().includes(search) || o.num.toString().includes(search)));

        filtered.forEach(o => {
            const stTxt = o.status === 'ok' ? 'FINI' : (o.status === 'in' ? 'EN COURS' : 'ATTENTE');
            const div = document.createElement('div');
            div.className = `card status-${o.status}`;
            div.innerHTML = `
                <div class="order-num">N° ${o.num}</div>
                <div style="flex:1">
                    <div style="font-weight:900; text-transform:uppercase;">${o.client}</div>
                    <div style="font-size:0.7rem; color:#64748b;">${o.color || ''}</div>
                    <div class="anno-text">${o.priority || ''}</div>
                </div>
                <div class="qty-badge">${o.qty}</div>
                <div class="print-status">${stTxt}</div>
                <div class="st-group print-hide">
                    <button class="st-btn ${o.status==='w'?'active':''}" onclick="setSt('${o.id}','w')">ATTENTE</button>
                    <button class="st-btn in ${o.status==='in'?'active':''}" onclick="setSt('${o.id}','in')">COURS</button>
                    <button class="st-btn ok ${o.status==='ok'?'active':''}" onclick="setSt('${o.id}','ok')">FINI</button>
                    <button class="st-btn edit" onclick="prepEdit('${o.id}')"><i class="fas fa-edit"></i> EDIT</button>
                    <button class="st-btn" onclick="del('${o.id}')" style="color:red"><i class="fas fa-trash"></i></button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    async function sync() {
        if(lock) return; lock = true;
        document.getElementById('sync-icon').innerHTML = "⏳";
        const dataToSync = [...orders, {id: 999, num: 0, client: JSON.stringify(categories), color: '', priority: '', qty: 0, cat: 'SYSTEM', status: 'x', dept: 'SYS'}];
        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataToSync) });
            setTimeout(() => { lock = false; document.getElementById('sync-icon').innerHTML = "●"; fetchData(); }, 2000);
        } catch(e) { lock = false; }
    }

    function addCategory() {
        const n = prompt("Nom de la nouvelle catégorie :");
        if(n) { categories.push(n.toUpperCase()); curTab = n.toUpperCase(); sync(); render(); }
    }
    function removeCat(c) {
        if(confirm("Supprimer définitivement la catégorie "+c+" ?")) { categories = categories.filter(x => x!==c); curTab = categories[0]; sync(); render(); }
    }

    function save() {
        const id = document.getElementById('f-id').value;
        const exist = id ? orders.find(x => x.id == id) : null;
        
        const newO = {
            id: id || "ID-" + Date.now() + Math.floor(Math.random()*1000),
            num: document.getElementById('f-num').value,
            client: document.getElementById('f-client').value.toUpperCase(),
            color: document.getElementById('f-color').value,
            priority: document.getElementById('f-priority').value,
            qty: document.getElementById('f-qty').value,
            cat: document.getElementById('f-cat').value,
            dept: exist ? exist.dept : curDept,
            status: exist ? exist.status : 'w'
        };

        if(id) {
            orders = orders.map(x => x.id == id ? newO : x);
        } else {
            orders.push(newO);
        }
        
        toggleView('v-main');
        sync();
    }

    function prepEdit(id) {
        const o = orders.find(x => x.id == id);
        if(!o) return;
        document.getElementById('f-id').value = o.id;
        document.getElementById('f-num').value = o.num;
        document.getElementById('f-client').value = o.client;
        document.getElementById('f-color').value = o.color;
        document.getElementById('f-priority').value = o.priority || "";
        document.getElementById('f-qty').value = o.qty;
        
        document.getElementById('f-cat').innerHTML = categories.map(c => `<option value="${c}" ${c===o.cat?'selected':''}>${c}</option>`).join('');
        document.getElementById('formTitle').innerText = "Modifier la Fiche";
        toggleView('v-form');
    }

    function prepAdd() { 
        document.getElementById('f-id').value = ""; 
        document.getElementById('f-num').value = "";
        document.getElementById('f-client').value = "";
        document.getElementById('f-color').value = "";
        document.getElementById('f-priority').value = "";
        document.getElementById('f-qty').value = "";
        document.getElementById('f-cat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join(''); 
        document.getElementById('formTitle').innerText = "Nouvelle Fiche";
        toggleView('v-form'); 
    }

    function setDept(d) { curDept = d; document.querySelectorAll('.dept-btn').forEach(b => b.classList.toggle('active', b.id==='b-'+d)); render(); }
    function setSt(id, s) { orders.find(x => x.id == id).status = s; render(); sync(); }
    function del(id) { if(confirm("Supprimer cette commande ?")) { orders = orders.filter(x => x.id != id); sync(); } }
    function toggleView(v) { document.querySelectorAll('.view').forEach(e => e.classList.remove('active')); document.getElementById(v).classList.add('active'); }

    fetchData();
</script>
</body>
</html>
